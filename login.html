<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Akun Manager</title>

  <!-- ===== SEO ===== -->
  <meta name="description"
    content="Masuk ke panel admin Akun Manager untuk mengelola akun digital Netflix, Spotify, CapCut, dan lainnya." />
  <meta name="keywords" content="akun manager, login admin, panel admin, akun digital" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="author" content="Akun Manager" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="application-name" content="Akun Manager" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Login — Akun Manager" />
  <meta property="og:description" content="Masuk ke panel admin untuk mengelola akun digital." />
  <meta property="og:locale" content="id_ID" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Login — Akun Manager" />
  <meta name="twitter:description" content="Masuk ke panel admin Akun Manager." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Loading -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Login Page -->
  <div class="auth-page" id="page-login">
    <div class="auth-card">

      <div class="auth-logo">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <h1>Akun Manager</h1>
        <p>Masuk ke panel admin Anda</p>
      </div>

      <!-- Alert Inline -->
      <div id="alert-inline" class="alert-inline hidden" role="alert">
        <span class="alert-inline-icon" id="alert-inline-icon"></span>
        <div class="alert-inline-body">
          <div class="alert-inline-title" id="alert-inline-title"></div>
          <div class="alert-inline-msg" id="alert-inline-msg"></div>
        </div>
        <button type="button" class="alert-inline-close" onclick="hideInlineAlert()" aria-label="Tutup">&times;</button>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-field">Email / Username <span class="req">*</span></label>
          <input type="text" id="login-field" class="form-control" placeholder="Masukkan email atau username"
            autocomplete="username" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="login-pass">Password <span class="req">*</span></label>
          <div class="input-group">
            <input type="password" id="login-pass" class="form-control" placeholder="Masukkan password"
              autocomplete="current-password" required />
            <button type="button" class="input-toggle" onclick="togglePass('login-pass')" title="Tampilkan">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn"
          style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:4px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          Masuk
        </button>
      </form>

      <div class="auth-footer">
        Belum ada akun admin? <a href="register.html">Daftar Sekarang</a>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script>
    /* ============================================================
       login.js — Logika halaman login
    ============================================================ */

    async function init() {
      // Jika sudah login, langsung ke app
      const token = getToken();
      if (token) {
        showLoading();
        try {
          const res = await api("validateSession", undefined, token);
          if (res.status === "success") {
            window.location.href = APP_PAGE;
            return;
          }
        } catch (e) { /* session invalid, tetap di login */ }
        clearSession();
        hideLoading();
      }

      // Cek apakah admin sudah ada — jika belum, ke register
      try {
        const check = await api("checkAdminExists", {}, "");
        if (check.status === "success" && !check.data.exists) {
          window.location.href = REG_PAGE;
          return;
        }
      } catch (e) {
        toast("error", "Gagal terhubung", "Periksa koneksi dan URL API.");
        showInlineAlert("error", "Gagal Terhubung", "Periksa koneksi internet dan URL API.");
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const login = document.getElementById("login-field").value.trim();
      const password = document.getElementById("login-pass").value;

      if (!login || !password) {
        toast("warning", "Form Tidak Lengkap", "Email/username dan password wajib diisi.");
        return;
      }

      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      showLoading();

      try {
        const res = await api("loginAdmin", { login, password }, "");

        if (res.status !== "success") {
          const msg = res.message || "Periksa kembali email/username dan password Anda.";
          toast("error", "Login Gagal", msg);
          showInlineAlert("error", "Login Gagal", msg);
          return;
        }

        saveSession(res.data.token, {
          username: res.data.username,
          email: res.data.email,
        });

        window.location.href = APP_PAGE;
      } catch (ex) {
        toast("error", "Error", ex.message);
        showInlineAlert("error", "Terjadi Kesalahan", ex.message);
      } finally {
        hideLoading();
        btn.disabled = false;
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>

</html>
