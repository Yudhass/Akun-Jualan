<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar Admin — Akun Manager</title>

  <!-- ===== SEO ===== -->
  <meta name="description"
    content="Daftarkan akun admin pertama untuk Akun Manager. Kelola akun digital Netflix, Spotify, CapCut, dan lainnya." />
  <meta name="keywords" content="akun manager, daftar admin, registrasi, panel admin" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="author" content="Akun Manager" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="application-name" content="Akun Manager" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Daftar Admin — Akun Manager" />
  <meta property="og:description" content="Buat akun admin pertama untuk Akun Manager." />
  <meta property="og:locale" content="id_ID" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Daftar Admin — Akun Manager" />
  <meta name="twitter:description" content="Daftarkan admin pertama untuk panel Akun Manager." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .info-box {
      background: var(--primary-light);
      border: 1px solid #c7d2fe;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--primary-dark);
      margin-bottom: 22px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
  </style>
</head>

<body>

  <!-- Loading -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Register Page -->
  <div class="auth-page" id="page-register">
    <div class="auth-card">

      <div class="auth-logo">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="22" y1="11" x2="16" y2="11" />
        </svg>
        <h1>Buat Akun Admin</h1>
        <p>Pendaftaran pertama kali</p>
      </div>

      <div class="info-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="flex-shrink:0;margin-top:1px;">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        Hanya satu akun admin yang diperbolehkan. Setelah terdaftar, halaman ini tidak dapat diakses kembali.
      </div>

      <!-- Alert Inline -->
      <div id="alert-inline" class="alert-inline hidden" role="alert">
        <span class="alert-inline-icon" id="alert-inline-icon"></span>
        <div class="alert-inline-body">
          <div class="alert-inline-title" id="alert-inline-title"></div>
          <div class="alert-inline-msg" id="alert-inline-msg"></div>
        </div>
        <button type="button" class="alert-inline-close" onclick="hideInlineAlert()" aria-label="Tutup">&times;</button>
      </div>

      <form id="register-form" onsubmit="handleRegister(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-username">Username <span class="req">*</span></label>
          <input type="text" id="reg-username" class="form-control" placeholder="Masukkan username"
            autocomplete="username" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email <span class="req">*</span></label>
          <input type="email" id="reg-email" class="form-control" placeholder="contoh@email.com" autocomplete="email"
            required />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-pass">Password <span class="req">*</span></label>
          <div class="input-group">
            <input type="password" id="reg-pass" class="form-control" placeholder="Minimal 6 karakter"
              autocomplete="new-password" required minlength="6" />
            <button type="button" class="input-toggle" onclick="togglePass('reg-pass')" title="Tampilkan">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-pass-confirm">Konfirmasi Password <span class="req">*</span></label>
          <div class="input-group">
            <input type="password" id="reg-pass-confirm" class="form-control" placeholder="Ulangi password"
              autocomplete="new-password" required />
            <button type="button" class="input-toggle" onclick="togglePass('reg-pass-confirm')" title="Tampilkan">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="reg-btn"
          style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:4px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          Daftar Sekarang
        </button>
      </form>

      <div class="auth-footer">
        Sudah punya akun? <a href="login.html">Masuk</a>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script>
    /* ============================================================
       register.js — Logika halaman registrasi admin
    ============================================================ */

    async function init() {
      // Jika sudah login, langsung ke app
      if (getToken()) {
        window.location.href = APP_PAGE;
        return;
      }

      // Jika admin sudah ada, ke login
      showLoading();
      try {
        const check = await api("checkAdminExists", {}, "");
        if (check.status === "success" && check.data.exists) {
          window.location.href = LOGIN_PAGE;
          return;
        }
      } catch (e) {
        toast("error", "Gagal terhubung", e.message);
      } finally {
        hideLoading();
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById("reg-username").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-pass").value;
      const confirm = document.getElementById("reg-pass-confirm").value;

      if (!username || !email || !password) {
        const msg = "Semua field wajib diisi.";
        toast("warning", "Form Tidak Lengkap", msg);
        showInlineAlert("warning", "Form Tidak Lengkap", msg);
        return;
      }
      if (password.length < 6) {
        const msg = "Password minimal 6 karakter.";
        toast("warning", "Password Lemah", msg);
        showInlineAlert("warning", "Password Lemah", msg);
        return;
      }
      if (password !== confirm) {
        const msg = "Konfirmasi password tidak sesuai.";
        toast("error", "Password Tidak Cocok", msg);
        showInlineAlert("error", "Password Tidak Cocok", msg);
        return;
      }

      const btn = document.getElementById("reg-btn");
      btn.disabled = true;
      showLoading();

      try {
        const res = await api("registerAdmin", { username, email, password }, "");

        if (res.status !== "success") {
          const msg = res.message || "Coba lagi.";
          toast("error", "Gagal Mendaftar", msg);
          showInlineAlert("error", "Gagal Mendaftar", msg);
          return;
        }

        toast("success", "Pendaftaran Berhasil", "Silakan login dengan akun baru Anda.");
        showInlineAlert("success", "Pendaftaran Berhasil!", "Akun admin berhasil dibuat. Mengalihkan ke halaman login...");
        document.getElementById("register-form").reset();
        setTimeout(() => { window.location.href = LOGIN_PAGE; }, 1800);
      } catch (ex) {
        toast("error", "Error", ex.message);
        showInlineAlert("error", "Terjadi Kesalahan", ex.message);
      } finally {
        hideLoading();
        btn.disabled = false;
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>

</html>
